services:
  - type: web
    name: bridgewood
    runtime: python
    plan: free
    region: ohio
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port ${PORT:-10000}
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgewood-db
          property: connectionString
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: PRICE_REFRESH_SECONDS
        value: "15"
      - key: SNAPSHOT_INTERVAL_MINUTES
        value: "5"
      - key: ALPACA_EQUITY_FEED
        value: "iex"
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","http://127.0.0.1:5173","https://bridgewood.vercel.app"]'

databases:
  - name: bridgewood-db
    plan: free
    region: ohio
    postgresMajorVersion: 16
