services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bridgewood
      POSTGRES_USER: bridgewood
      POSTGRES_PASSWORD: bridgewood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://bridgewood:bridgewood@postgres:5432/bridgewood
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      PRICE_REFRESH_SECONDS: "15"
      SNAPSHOT_INTERVAL_MINUTES: "5"
      ALPACA_EQUITY_FEED: "iex"
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
